<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Makes website responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Expense Tracker</title>

    <!-- Connecting our CSS file with HTML -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main container of our application -->
    <div class="container">


        <!-- Website heading -->
        <header>
            <h1>💰 Smart Expense Tracker</h1>
            <p>Manage your daily expenses easily</p>
        </header>



        <!-- Section where user will add a new expense -->
        <section class="expense-form">

            <h2>Add New Expense</h2>


            <!-- 
                Form is used to collect information from the user.
                JavaScript will later take these values and save them.
            -->
            <form id="expenseForm">


                <!-- Expense name input -->
                <label for="expenseName">
                    Expense Name
                </label>

                <input 
                    type="text" 
                    id="expenseName" 
                    placeholder="Example: Food"
                    required
                >



                <!-- Expense amount input -->
                <label for="expenseAmount">
                    Amount
                </label>

                <input 
                    type="number" 
                    id="expenseAmount" 
                    placeholder="Example: 500"
                    required
                >



                <!-- Expense category selection -->
                <label for="expenseCategory">
                    Category
                </label>

                <select id="expenseCategory">

                    <option value="Food">
                        Food
                    </option>

                    <option value="Transport">
                        Transport
                    </option>

                    <option value="Bills">
                        Bills
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>



                <!-- Date input -->
                <label for="expenseDate">
                    Date
                </label>

                <input 
                    type="date" 
                    id="expenseDate"
                    required
                >



                <!-- Button to submit expense -->
                <button type="submit">
                    Add Expense
                </button>


            </form>

        </section>





        <!-- Section showing total expenses -->
        <section class="total-section">

            <h2>
                Total Expenses
            </h2>


            <!-- 
                JavaScript will update this number automatically
            -->
            <h3 id="totalAmount">
                Rs. 0
            </h3>


        </section>






        <!-- Section where added expenses will appear -->
        <section class="expense-list">


            <h2>
                Your Expenses
            </h2>


            <!-- 
                JavaScript will create expense cards
                and place them inside this div
            -->
            <div id="expenseContainer">


                <!-- Expenses will appear here -->


            </div>


        </section>




    </div>



    <!-- Connecting JavaScript file -->
    <script src="script.js"></script>


</body>

</html>
